
"--------------------------------------------------------------------------
| Vendor GraphQL Types
--------------------------------------------------------------------------"
type Vendor {
    id: ID!
    created_at: DateTime
    updated_at: DateTime
}

input CreateVendorInput {
}

input UpdateVendorInput {
    id: ID! @rules(apply: ["required"])
}

extend type Query {
    vendor(id: ID! @eq): Vendor @find
    vendors: [Vendor!]! @paginate(defaultCount: 10)
}

extend type Mutation {
    createVendor(input: CreateVendorInput! @spread): Vendor @create
    updateVendor(input: UpdateVendorInput! @spread): Vendor @update
    deleteVendor(id: ID! @whereKey): Vendor @delete
}

"--------------------------------------------------------------------------
| Category GraphQL Types
--------------------------------------------------------------------------"
type Category {
    id: ID!
    parent_id: String
    name: String!
    slug: String!
    description: String
    is_active: Boolean!
    sort_order: Int!
    deleted_at: DateTime
    created_at: DateTime
    updated_at: DateTime
}

input CreateCategoryInput {
    parent_id: String
    name: String!
    slug: String!
    description: String
    is_active: Boolean!
    sort_order: Int!
}

input UpdateCategoryInput {
    id: ID! @rules(apply: ["required"])
    parent_id: String
    name: String
    slug: String
    description: String
    is_active: Boolean
    sort_order: Int
}

extend type Query {
    category(id: ID! @eq): Category @find
    categories: [Category!]! @paginate(defaultCount: 10)
}

extend type Mutation {
    createCategory(input: CreateCategoryInput! @spread): Category @create
    updateCategory(input: UpdateCategoryInput! @spread): Category @update
    deleteCategory(id: ID! @whereKey): Category @delete
}

